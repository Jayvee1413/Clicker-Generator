server {
    # Cloud Run routes traffic to $PORT (default 8080).
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types application/javascript text/javascript application/wasm text/css application/json image/svg+xml;
    gzip_min_length 1024;

    # WASM must be served as application/wasm for WebAssembly streaming compilation.
    # Regex location wins over the /assets/ prefix, so give it cache headers too.
    location ~* \.wasm$ {
        default_type application/wasm;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Long-cache the fingerprinted build assets; the HTML shell stays uncached.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
